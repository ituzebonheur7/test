
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ituze Studio Pro | IDE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg: #0d1117;
            --panel: rgba(22, 27, 34, 0.8);
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #2f81f7;
            --danger: #f85149;
            --success: #3fb950;
        }

        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; margin: 0;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Glassmorphism Header */
        header {
            height: 55px;
            backdrop-filter: blur(12px);
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
        }

        .status-pill {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #8b949e;
            margin-left: 10px;
        }

        main { flex: 1; display: flex; overflow: hidden; }

        #sidebar {
            width: 260px;
            background: #0d1117;
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }

        .file-item {
            padding: 10px 15px;
            font-size: 13px;
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; color: #8b949e;
            transition: 0.2s;
        }
        .file-item:hover { background: #161b22; color: #fff; }
        .file-item.active { background: rgba(47, 129, 247, 0.1); color: var(--accent); border-right: 2px solid var(--accent); }
        
        .file-actions { margin-left: auto; display: none; gap: 8px; }
        .file-item:hover .file-actions { display: flex; }

        #editor-container { flex: 1; min-width: 0; }
        .CodeMirror { height: 100% !important; font-size: 14px; background: transparent !important; }

        #preview-container { width: 45%; background: #fff; display: flex; flex-direction: column; }
        #preview-frame { flex: 1; border: none; width: 100%; height: 100%; }

        .btn {
            padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
            background: #21262d; color: var(--text); cursor: pointer; font-size: 12px;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--accent); color: white; border: none; }

        /* Resizer */
        #resizer { width: 4px; cursor: col-resize; background: var(--border); transition: 0.2s; }
        #resizer:hover { background: var(--accent); }

        @media (max-width: 768px) {
            #resizer, #preview-container { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items:center;">
            <strong style="color:var(--accent)">Ituze Pro</strong>
            <span id="save-status" class="status-pill">Synced</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="downloadProject()"><i data-lucide="archive"></i> Export ZIP</button>
            <button class="btn btn-primary" onclick="shareLive()"><i data-lucide="share-2"></i> Deploy URL</button>
        </div>
    </header>

    <main>
        <div id="sidebar">
            <div style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:11px; text-transform:uppercase; opacity:0.5;">Explorer</span>
                <i data-lucide="file-plus" style="width:16px; cursor:pointer;" onclick="createNewFile()"></i>
            </div>
            <div id="file-list"></div>
        </div>

        <div id="editor-container">
            <textarea id="editor"></textarea>
        </div>

        <div id="resizer"></div>

        <div id="preview-container">
            <iframe id="preview-frame"></iframe>
        </div>
    </main>

    <script>
        let editor;
        let files = {};
        let activeFile = 'index.html';
        let currentBlobUrl = null;

        const defaultProject = {
            'index.html': { content: '<html>\n<head>\n <link rel="stylesheet" href="style.css">\n</head>\n<body>\n <h1>Ituze v2.0</h1>\n <button id="run">Test Logic</button>\n <script src="script.js"><\/script>\n</body>\n</html>' },
            'style.css': { content: 'body { background: #111; color: #2f81f7; text-align: center; padding-top: 50px; font-family: sans-serif; }' },
            'script.js': { content: 'document.getElementById("run").onclick = () => {\n  console.log("Checking for errors...");\n  throw new Error("This is a test error to show the new Debugger!");\n};' }
        };

        function init() {
            const saved = localStorage.getItem('ituze_pro_v2');
            files = saved ? JSON.parse(saved) : defaultProject;

            editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
                theme: 'dracula',
                lineNumbers: true,
                mode: 'htmlmixed',
                autoCloseBrackets: true,
                lineWrapping: true
            });

            editor.on('change', () => {
                updateStatus("Saving...");
                files[activeFile].content = editor.getValue();
                localStorage.setItem('ituze_pro_v2', JSON.stringify(files));
                
                // Debounce preview for performance
                clearTimeout(window.prevTimer);
                window.prevTimer = setTimeout(() => {
                    updatePreview();
                    updateStatus("Synced");
                }, 500);
            });

            renderFileList();
            switchFile(Object.keys(files)[0]);
            setupResizer();
            lucide.createIcons();
        }

        function updatePreview() {
            const frame = document.getElementById('preview-frame');
            let html = files['index.html']?.content || '<h1>index.html missing</h1>';
            
            // Fix 1: Runtime Error Overlay Injection
            const errorCapture = `
            <script>
                window.onerror = function(msg, url, line) {
                    const errDiv = document.createElement('div');
                    errDiv.style = "position:fixed;bottom:0;left:0;right:0;background:#f85149;color:white;padding:15px;font-family:monospace;z-index:9999;font-size:12px";
                    errDiv.innerHTML = "<strong>Runtime Error:</strong> " + msg + "<br><small>Line: " + line + "</small>";
                    document.body.appendChild(errDiv);
                };
            <\/script>`;

            let css = "";
            let js = "";
            Object.keys(files).forEach(name => {
                if (name.endsWith('.css')) css += `<style>${files[name].content}</style>`;
                if (name.endsWith('.js')) js += `<script>${files[name].content}<\/script>`;
            });

            const combined = html.replace('</head>', `${css}${errorCapture}</head>`)
                                .replace('</body>', `${js}</body>`);

            const blob = new Blob([combined], { type: 'text/html' });

            // Fix 2: Prevent Memory Leak (Revoke old URL)
            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            currentBlobUrl = URL.createObjectURL(blob);
            frame.src = currentBlobUrl;
        }

        function switchFile(name) {
            activeFile = name;
            editor.setValue(files[name].content);
            const mode = name.endsWith('.css') ? 'css' : name.endsWith('.js') ? 'javascript' : 'htmlmixed';
            editor.setOption('mode', mode);
            renderFileList();
        }

        // Fix 3: Rename functionality
        function renameFile(oldName) {
            event.stopPropagation();
            const newName = prompt("New filename:", oldName);
            if (!newName || files[newName] || newName === oldName) return;
            
            files[newName] = files[oldName];
            delete files[oldName];
            if (activeFile === oldName) activeFile = newName;
            
            renderFileList();
            updatePreview();
        }

        function renderFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            Object.keys(files).forEach(name => {
                const div = document.createElement('div');
                div.className = `file-item ${name === activeFile ? 'active' : ''}`;
                div.onclick = () => switchFile(name);
                div.innerHTML = `
                    <i data-lucide="file-code" style="width:14px"></i>
                    <span style="flex:1">${name}</span>
                    <div class="file-actions">
                        <i data-lucide="edit-3" style="width:12px" onclick="renameFile('${name}')"></i>
                        <i data-lucide="trash-2" style="width:12px; color:var(--danger)" onclick="deleteFile('${name}')"></i>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function createNewFile() {
            const name = prompt("Filename (e.g. style.css):");
            if (name && !files[name]) {
                files[name] = { content: '' };
                switchFile(name);
            }
        }

        function deleteFile(name) {
            event.stopPropagation();
            if (Object.keys(files).length > 1 && confirm(`Delete ${name}?`)) {
                delete files[name];
                switchFile(Object.keys(files)[0]);
            }
        }

        function updateStatus(text) {
            document.getElementById('save-status').innerText = text;
        }

        function shareLive() {
            const data = btoa(unescape(encodeURIComponent(JSON.stringify(files))));
            const url = window.location.href.split('?')[0] + '?data=' + data;
            navigator.clipboard.writeText(url);
            alert("Shareable URL (Base64) copied to clipboard!");
        }

        function setupResizer() {
            const resizer = document.getElementById('resizer');
            const editorCont = document.getElementById('editor-container');
            const previewCont = document.getElementById('preview-container');
            let isResizing = false;

            resizer.addEventListener('mousedown', () => isResizing = true);
            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                let percent = (e.clientX / window.innerWidth) * 100;
                editorCont.style.width = percent + '%';
                previewCont.style.width = (100 - percent) + '%';
            });
            window.addEventListener('mouseup', () => isResizing = false);
        }

        window.onload = init;
    </script>
</body>
</html>
