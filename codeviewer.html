
<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://ituzebonheur.com/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ituze IDE — A browser-based code editor with live preview, file management, Monaco editor integration, and multi-file project support. Build, edit, and preview HTML, CSS, and JavaScript projects instantly in your browser.">
    <meta name="keywords" content="HTML, CSS, JavaScript, tutorials, coding, codeviewer, html viewer, web tester">
    <title>IDE Codeviewer - Ituze</title>
    <link rel="preconnect" href="https://ituzebonheur.com">
    <link rel="dns-prefetch" href="https://ituzebonheur.com">
    
    <link rel="preload" href="/js/jszip.min.js" as="script">
    <link rel="preload" href="/js/lucide.min.js" as="script">
    <link rel="preload" href="/monaco/min/vs/loader.js" as="script">
    
    <script src="/js/jszip.min.js" defer></script>
    <script src="/js/lucide.min.js" defer></script>
    <script src="/monaco/min/vs/loader.js" defer></script>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/images/code.png" type="image/png">

    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #2f81f7;
            --accent-hover: #58a6ff;
            --hover: #21262d;
            --danger: #f85149;
            --header-h: 50px;
            --tab-h: 40px;
            --sidebar-w: 260px;
            --glass-bg: rgba(22, 27, 34, 0.72);
            --glass-border: rgba(48, 54, 61, 0.8);
            --preview-bg: #ffffff;
            --preview-text: #000000;
        }

        * { box-sizing: border-box; outline: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #launch-screen {
            position: fixed;
            inset: 0;
            background: #1c1c1d;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            box-sizing: border-box;
            overflow: hidden;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #launch-screen.fade-out {
            opacity: 0;
            transform: scale(1.04);
            pointer-events: none;
        }

        .launch-top-spacer { height: 40px; }

        .launch-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .launch-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 10px;
        }

        header {
            height: var(--header-h);
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { color: var(--accent); display: flex; align-items: center; }

        #topLink {
            height: 32px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            background: var(--glass-bg);
            backdrop-filter: blur(26px);
            -webkit-backdrop-filter: blur(26px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #topLink:hover { background: rgba(47,129,247,0.15); border-color: var(--accent); }
        #topLink.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; }

        #iframePanel {
            position: fixed;
            top: 58px;
            left: 20px;
            width: 100px;
            height: 42px;
            border-radius: 25px;
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
            background: transparent;
            border: none;
            box-shadow: 0 0 0 rgba(0,0,0,0);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #iframePanel.open {
            opacity: 1;
            width: 420px;
            height: 680px;
            border-radius: 32px;
            pointer-events: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.85);
        }
        #iframePanelContent {
            width: 100%;
            height: 100%;
            display: flex;
            opacity: 0;
            background: transparent;
            transition: opacity 0.35s ease 0.15s;
        }
        #iframePanel.open #iframePanelContent { opacity: 1; }
        #iframePanelContent iframe { width: 100%; height: 100%; border: none; background: transparent; }

        .actions { display: flex; gap: 10px; align-items: center; }

        main { flex: 1; display: flex; overflow: hidden; }

        #sidebar {
            width: var(--sidebar-w);
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background 0.3s, backdrop-filter 0.3s;
            position: relative;
        }
        .glass-sidebar { backdrop-filter: blur(15px); background: rgba(22,27,34,0.6) !important; }

        .sidebar-header {
            padding: 15px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
        }

        #file-tree { flex: 1; overflow-y: auto; padding: 5px 0; }

        .tree-item {
            cursor: pointer;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-dim);
            transition: all 0.2s ease;
            user-select: none;
        }
        .tree-item:hover { background: var(--hover); color: var(--text); }
        .tree-item.active {
            background: #1f6feb15;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            padding-left: 12px;
        }
        .tree-item.drag-over {
            background: rgba(47, 129, 247, 0.2);
            border-left: 3px solid var(--accent);
        }
        .folder-indent { margin-left: 19px; border-left: 1px solid var(--border); }

        #upload-zone {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.3s ease;
        }
        #upload-zone.show {
            display: flex;
        }
        .upload-card {
            background: var(--panel);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s ease;
            max-width: 480px;
        }
        .upload-card.drag-over {
            border-color: var(--accent);
            background: rgba(47, 129, 247, 0.1);
            box-shadow: 0 0 24px rgba(47, 129, 247, 0.3);
            transform: scale(1.02);
        }
        .upload-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            opacity: 0.7;
        }
        .upload-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .upload-subtitle {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }
        .upload-browse {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        .upload-browse:hover { background: var(--accent-hover); }
        .upload-types {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 16px;
        }
        #file-input-upload { display: none; }

        :root {
            --vs-surface: #252526;
            --vs-border-cm: #454545;
            --vs-text-cm: #cccccc;
            --vs-text-disabled: #6c6c6c;
            --vs-hover-bg: #04395e;
            --vs-hover-text: #ffffff;
            --vs-danger-hover: #c42b1c;
            --vs-shadow: rgba(0,0,0,0.5);
        }
        .vs-context-menu {
            display: none;
            position: fixed;
            background-color: var(--vs-surface);
            border: 1px solid var(--vs-border-cm);
            border-radius: 5px;
            box-shadow: 0 6px 20px var(--vs-shadow);
            padding: 4px 0;
            min-width: 220px;
            max-width: 300px;
            z-index: 9999;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .menu-list { list-style: none; margin: 0; padding: 0; }
        .menu-item {
            display: flex; align-items: center;
            padding: 5px 10px; cursor: pointer;
            color: var(--vs-text-cm); font-size: 13px; line-height: 1.4; gap: 0;
        }
        .menu-item.disabled { opacity: 0.45; pointer-events: none; }
        .menu-icon { width: 16px; height: 16px; margin-right: 8px; flex-shrink: 0; opacity: 0.85; color: var(--vs-text-cm); }
        .menu-label { flex-grow: 1; white-space: nowrap; }
        .shortcut { font-size: 11px; color: var(--vs-text-disabled); margin-left: 24px; padding-right: 4px; white-space: nowrap; }
        .menu-item:hover { background-color: var(--vs-hover-bg); color: var(--vs-hover-text); }
        .menu-item:hover .menu-icon, .menu-item:hover .shortcut { color: var(--vs-hover-text); opacity: 1; }
        .menu-divider { height: 1px; background-color: var(--vs-border-cm); margin: 4px 0; }
        .menu-item.danger:hover { background-color: var(--vs-danger-hover); }

        #editor-container { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        #tab-bar {
            height: var(--tab-h);
            background: var(--panel);
            display: flex;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .tab {
            padding: 0 16px; height: 100%;
            display: flex; align-items: center; gap: 10px;
            font-size: 13px; color: var(--text-dim);
            border-right: 1px solid var(--border);
            cursor: pointer; background: var(--panel);
            transition: background 0.2s; user-select: none; white-space: nowrap;
        }
        .tab:hover { background: var(--hover); }
        .tab.active { background: var(--bg); color: var(--text); border-top: 2px solid var(--accent); }
        .tab-close { opacity: 0.6; transition: opacity 0.2s; }
        .tab-close:hover { opacity: 1; color: var(--danger); }

        #monaco-editor { flex: 1; padding-top: 5px; }

        #resizer {
            width: 5px; cursor: col-resize;
            background: var(--border); transition: background 0.2s; z-index: 10;
        }
        #resizer:hover, #resizer.active { background: var(--accent); }

        #preview-section { width: 40%; display: flex; flex-direction: column; background: #ffffff; position: relative; }
        .preview-toolbar {
            background: var(--panel); padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); color: var(--text);
        }
        #preview-frame {
            flex: 1; border: none; width: 100%; height: 100%;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            margin: 0 auto; background: #fff;
        }
        .preview-mobile { width: 375px !important; border: 12px solid #222 !important; border-bottom: 25px solid #222 !important; border-radius: 30px; height: calc(100% - 40px) !important; margin: 20px auto !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .preview-tablet { width: 768px !important; border: 12px solid #222 !important; border-radius: 20px; height: calc(100% - 40px) !important; margin: 20px auto !important; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #preview-section.theme-dark { background: #1e1e1e; }
        #preview-section.theme-hc { background: #000000; }

        #settings-panel {
            position: absolute; right: 0; top: 0; bottom: 0; width: 320px;
            background: var(--panel); border-left: 1px solid var(--border);
            z-index: 200; display: none; flex-direction: column;
            box-shadow: -8px 0 24px rgba(0,0,0,0.5);
            transform: translateX(100%); transition: transform 0.3s ease;
        }
        #settings-panel.show { display: flex; transform: translateX(0); }
        .settings-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            font-weight: 600; display: flex; justify-content: space-between; align-items: center;
        }
        .settings-content { padding: 20px; overflow-y: auto; flex: 1; }
        .setting-group { margin-bottom: 24px; }
        .setting-label { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; display: block; font-weight: 500; }
        input[type="text"], select {
            width: 100%; background: var(--bg); color: var(--text);
            border: 1px solid var(--border); padding: 8px 12px;
            border-radius: 6px; font-size: 13px; transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus { border-color: var(--accent); }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        .checkbox-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; margin-bottom: 8px; cursor: pointer;
        }
        .checkbox-label input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

        .btn {
            cursor: pointer; background: var(--hover); border: 1px solid var(--border);
            color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 13px;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s ease; font-weight: 500;
        }
        .btn:hover { background: var(--border); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .icon-btn { cursor: pointer; opacity: 0.7; transition: opacity 0.2s; display: flex; align-items: center; }
        .icon-btn:hover { opacity: 1; color: var(--accent); }

        .tree-rename-input {
            background: var(--bg); border: 1px solid var(--accent);
            color: var(--text); font-size: 13px; padding: 2px 6px;
            border-radius: 4px; outline: none; width: calc(100% - 30px);
        }

        [data-tooltip] {
            position: relative;
        }
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10001;
            pointer-events: none;
        }
    </style>
</head>

<div id="upload-zone">
    <div class="upload-card" id="upload-card">
        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <div class="upload-title">Drag & drop your files here</div>
        <div class="upload-subtitle">or browse your computer</div>
        <button class="upload-browse" onclick="document.getElementById('file-input-upload').click()">Browse Files</button>
        <div class="upload-types">Supports .html, .css, .js, .json and .txt files</div>
    </div>
    <input type="file" id="file-input-upload" multiple accept=".html,.css,.js,.json,.txt">
</div>

<header>
    <div class="logo-area">
        <span class="logo-icon"><i data-lucide="terminal-square" style="width:22px;height:22px;"></i></span>
        <button id="topLink" class="top-btn" aria-label="Open Ituze profile">Ituze</button>
    </div>
    <div class="actions">
        <button class="btn" id="uploadBtn" onclick="showUploadZone()" data-tooltip="Upload Files"><i data-lucide="upload" style="width:16px"></i> Upload</button>
        <button class="btn" onclick="downloadProject()" data-tooltip="Download Project as ZIP"><i data-lucide="download" style="width:16px"></i> Download</button>
        <button class="btn" onclick="openInNewTab()" data-tooltip="Run Code"><i data-lucide="external-link" style="width:16px"></i> Full Screen</button>
        <button class="btn" id="settingsBtn" onclick="toggleSettings()" data-tooltip="Settings"><i data-lucide="settings" style="width:16px"></i> Settings</button>
        <button class="btn btn-primary" onclick="updatePreview()" data-tooltip="Run Code"><i data-lucide="play" style="width:16px"></i> Run Code</button>
    </div>
</header>

<div id="iframePanel">
    <div id="iframePanelContent"></div>
</div>

<main>
    <div id="sidebar">
        <div class="sidebar-header">
            <span>Explorer</span>
            <div style="display:flex;gap:10px;">
                <span class="icon-btn" onclick="createItem('file')" title="New File"><i data-lucide="file-plus" style="width:16px"></i></span>
                <span class="icon-btn" onclick="createItem('folder')" title="New Folder"><i data-lucide="folder-plus" style="width:16px"></i></span>
            </div>
        </div>
        <div id="file-tree"></div>
    </div>

    <div class="vs-context-menu" id="vs-context-menu">
        <ul class="menu-list">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-4RPPG857F8"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date);gtag('config','G-4RPPG857F8')</script>

<script>
    let editor;
    let files = {};
    let openTabs = ['index.html'];
    let activeFile = 'index.html';
    let autoRunTimer;
    let clipboard = { action: null, path: null, content: null };
    let ctxTarget = null;
    let ctxTargetIsFolder = false;

    let openPanel = null;

    const defaultFiles = {
        'index.html': { type: 'file', content: '<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Cyber App</title>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <div class="card">\n    <h1>Ituze Code Viewer</h1>\n    <p>File management, code editing, and full live preview.</p>\n    <button id="btn">Test Script</button>\n  </div>\n  <script src="script.js"><\/script>\n</body>\n</html>' },
        'style.css': { type: 'file', content: 'body {\n  background: #0d1117;\n  color: #c9d1d9;\n  font-family: system-ui, sans-serif;\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 100vh;\n  margin: 0;\n}\n\n.card {\n  text-align: center;\n  padding: 3rem;\n  border: 1px solid #30363d;\n  border-radius: 16px;\n  background: #161b22;\n  box-shadow: 0 12px 32px rgba(0,0,0,0.6);\n  max-width: 400px;\n}\n\nh1 { color: #58a6ff; margin-top: 0; font-size: 1.8rem; }\n\nbutton {\n  background: #238636;\n  color: white;\n  border: 1px solid rgba(240,246,252,0.1);\n  padding: 12px 28px;\n  border-radius: 8px;\n  cursor: pointer;\n  font-weight: 600;\n  font-size: 1rem;\n  transition: all 0.2s;\n  margin-top: 1rem;\n}\n\nbutton:hover {\n  background: #2ea043;\n  transform: translateY(-2px);\n}' },
        'script.js': { type: 'file', content: 'document.getElementById("btn").addEventListener("click", () => {\n  alert("✨ JavaScript execution is working properly!");\n});' },
        'assets': { type: 'folder', children: {} }
    };

    const SUPPORTED_UPLOAD_TYPES = ['html', 'css', 'js', 'json', 'txt'];

    function dismissLaunch() {
        const ls = document.getElementById('launch-screen');
        ls.classList.add('fade-out');
        setTimeout(() => { ls.style.display = 'none'; }, 650);
    }

    require.config({ paths: { 'vs': '/monaco/min/vs' }});
    require(['vs/editor/editor.main'], () => { initIDE(); });

    function initIDE() {
        const savedFiles = localStorage.getItem('ituze_files');
        try {
            files = savedFiles ? JSON.parse(savedFiles) : JSON.parse(JSON.stringify(defaultFiles));
        } catch(e) {
            files = JSON.parse(JSON.stringify(defaultFiles));
        }

        const savedSettings = JSON.parse(localStorage.getItem('ituze_settings') || 'null') || {
            theme: 'vs-dark',
            lineheight: 1.5, wrap: 'on',
            glass: false, numbers: true, autorun: true, baseurl: ''
        };

        editor = monaco.editor.create(document.getElementById('monaco-editor'), {
            theme: savedSettings.theme,
            fontFamily: "Consolas, 'Courier New', monospace",
            fontLigatures: false,
            lineHeight: savedSettings.lineheight * 14,
            wordWrap: savedSettings.wrap,
            cursorStyle: 'line',
            lineNumbers: savedSettings.numbers ? 'on' : 'off',
            automaticLayout: true,
            minimap: { enabled: false },
            padding: { top: 16 },
            scrollBeyondLastLine: false,
            smoothScrolling: true
        });

        editor.onDidChangeModelContent(() => {
            const isAuto = document.getElementById('set-autorun').checked;
            if (isAuto) {
                clearTimeout(autoRunTimer);
                autoRunTimer = setTimeout(() => { saveToLocalStorage(); updatePreview(); }, 900);
            }
        });

        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => { saveToLocalStorage(); updatePreview(); });
        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, () => { updatePreview(); });

        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key === 'n') { e.preventDefault(); createItem('file'); }
            if (e.altKey && e.shiftKey && e.key === 'N') { e.preventDefault(); createItem('folder'); }
            if (e.key === 'F2' && activeFile) { startRename(activeFile); }
            if (e.key === 'Delete' && document.activeElement === document.body && activeFile) {
                if (confirm(`Delete '${activeFile}'?`)) deleteItem(activeFile);
            }
            if (e.key === 'Escape') {
                closeAllPanels();
                hideContextMenu();
                hideUploadZone();
            }
        });

        setupModels(files);

        document.getElementById('set-theme').value = savedSettings.theme;
        document.getElementById('set-lineheight').value = savedSettings.lineheight;
        document.getElementById('set-wordwrap').value = savedSettings.wrap;
        document.getElementById('set-glass').checked = savedSettings.glass;
        document.getElementById('set-numbers').checked = savedSettings.numbers;
        document.getElementById('set-autorun').checked = savedSettings.autorun;
        document.getElementById('set-baseurl').value = savedSettings.baseurl || '';

        applySettings(false);

        const savedState = JSON.parse(localStorage.getItem('ituze_state') || 'null');
        if (savedState) {
            openTabs = savedState.openTabs || ['index.html'];
            activeFile = savedState.activeFile || 'index.html';
            openTabs = openTabs.filter(p => getFileNode(p) !== null);
            if (!getFileNode(activeFile)) activeFile = openTabs[0] || null;
        }

        if (activeFile) switchFile(activeFile);
        else { const f = findFirstFile(files); if (f) switchFile(f); }

        renderTree();
        setupResizer();
        setupContextMenu();
        setupItuzePanel();
        setupGlobalPanelClose();
        setupUploadZone();
        lucide.createIcons();
        updatePreview();

        setTimeout(dismissLaunch, 2200);
    }

    function openPanelExclusive(name) {
        if (openPanel && openPanel !== name) closePanelByName(openPanel);
        openPanel = name;
        if (name === 'settings') {
            const panel = document.getElementById('settings-panel');
            panel.style.display = 'flex';
            setTimeout(() => panel.classList.add('show'), 10);
        } else if (name === 'ituze') {
            document.getElementById('iframePanel').classList.add('open');
        }
    }

    function closePanelByName(name) {
        if (name === 'settings') {
            const panel = document.getElementById('settings-panel');
            panel.classList.remove('show');
            setTimeout(() => { panel.style.display = 'none'; }, 300);
        } else if (name === 'ituze') {
            const panel = document.getElementById('iframePanel');
            const content = document.getElementById('iframePanelContent');
            panel.classList.remove('open');
            setTimeout(() => { content.innerHTML = ''; }, 460);
        }
        if (openPanel === name) openPanel = null;
    }

    function closeAllPanels() {
        if (openPanel) closePanelByName(openPanel);
        openPanel = null;
    }

    function setupGlobalPanelClose() {
        document.addEventListener('click', (e) => {
            if (!openPanel) return;

            const spPanel    = document.getElementById('settings-panel');
            const settingsBtn = document.getElementById('settingsBtn');
            const iPanel     = document.getElementById('iframePanel');
            const topLinkBtn = document.getElementById('topLink');

            if (openPanel === 'settings') {
                if (!spPanel.contains(e.target) && settingsBtn && !settingsBtn.contains(e.target)) {
                    closePanelByName('settings');
                }
            } else if (openPanel === 'ituze') {
                if (!iPanel.contains(e.target) && !topLinkBtn.contains(e.target)) {
                    closePanelByName('ituze');
                }
            }
        });
    }

    function getMonacoLang(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (ext === 'js')   return 'javascript';
        if (ext === 'css')  return 'css';
        if (ext === 'json') return 'json';
        if (ext === 'ts')   return 'typescript';
        if (ext === 'md')   return 'markdown';
        if (ext === 'txt')  return 'plaintext';
        if (ext === 'html') return 'html';
        return 'plaintext';
    }

    function setupModels(obj, path = '') {
        for (let key in obj) {
            const fullPath = path + key;
            if (obj[key].type === 'file') {
                const uri = monaco.Uri.parse(`file:///${fullPath}`);
                if (!monaco.editor.getModel(uri)) {
                    monaco.editor.createModel(obj[key].content || '', getMonacoLang(key), uri);
                }
            } else if (obj[key].type === 'folder') {
                setupModels(obj[key].children, fullPath + '/');
            }
        }
    }

    function findFirstFile(obj, path = '') {
        for (let key in obj) {
            const fullPath = path + key;
            if (obj[key].type === 'file') return fullPath;
            if (obj[key].type === 'folder') {
                const found = findFirstFile(obj[key].children, fullPath + '/');
                if (found) return found;
            }
        }
        return null;
    }

    function getFileNode(path) {
        const parts = path.split('/').filter(Boolean);
        let current = files;
        for (let i = 0; i < parts.length; i++) {
            if (!current[parts[i]]) return null;
            if (i === parts.length - 1) return current[parts[i]];
            if (!current[parts[i]].children) return null;
            current = current[parts[i]].children;
        }
        return null;
    }

    function getParentAndName(path) {
        const parts = path.split('/').filter(Boolean);
        const name = parts.pop();
        let current = files;
        for (let p of parts) {
            if (!current[p] || !current[p].children) return { parent: null, name };
            current = current[p].children;
        }
        return { parent: current, name };
    }

    function countFilesInTree(obj) {
        let count = 0;
        for (let k in obj) {
            if (obj[k].type === 'file') count++;
            if (obj[k].type === 'folder') count += countFilesInTree(obj[k].children);
        }
        return count;
    }

    function switchFile(path) {
        if (activeFile && editor.getModel()) {
            const node = getFileNode(activeFile);
            if (node && node.type === 'file') node.content = editor.getModel().getValue();
        }
        activeFile = path;
        const uri = monaco.Uri.parse(`file:///${path}`);
        let model = monaco.editor.getModel(uri);
        if (!model) {
            const node = getFileNode(path);
            if (!node) return;
            model = monaco.editor.createModel(node.content || '', getMonacoLang(path.split('/').pop()), uri);
        }
        editor.setModel(model);
        if (!openTabs.includes(path)) openTabs.push(path);
        renderTabs();
        renderTree();
        saveState();
    }

    function saveState() {
        localStorage.setItem('ituze_state', JSON.stringify({ openTabs, activeFile }));
    }

    function renderTree() {
        const container = document.getElementById('file-tree');
        container.innerHTML = '';
        const buildTree = (obj, parent, path = '') => {
            const keys = Object.keys(obj).sort((a, b) => {
                if (obj[a].type === obj[b].type) return a.localeCompare(b);
                return obj[a].type === 'folder' ? -1 : 1;
            });
            for (let key of keys) {
                const fullPath = path + key;
                const node = obj[key];
                const div = document.createElement('div');
                div.className = `tree-item ${fullPath === activeFile ? 'active' : ''}`;
                div.setAttribute('data-path', fullPath);
                div.setAttribute('data-type', node.type);
                const icon = node.type === 'folder' ? 'folder' : getFileIcon(key);
                const iconColor = node.type === 'folder' ? '#8b949e' : getFileColor(key);
                div.innerHTML = `<i data-lucide="${icon}" style="width:16px;color:${iconColor}"></i><span>${key}</span>`;
                if (node.type === 'file') {
                    div.onclick = () => switchFile(fullPath);
                }

                div.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (node.type === 'folder') {
                        div.classList.add('drag-over');
                    }
                });
                div.addEventListener('dragleave', () => {
                    div.classList.remove('drag-over');
                });
                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    div.classList.remove('drag-over');
                    if (node.type === 'folder') {
                        const uploadedFiles = e.dataTransfer.files;
                        handleUploadedFiles(uploadedFiles, fullPath);
                    }
                });

                parent.appendChild(div);
                if (node.type === 'folder') {
                    const childCont = document.createElement('div');
                    childCont.className = 'folder-indent';
                    parent.appendChild(childCont);
                    buildTree(node.children, childCont, fullPath + '/');
                }
            }
        };
        buildTree(files, container);
        lucide.createIcons();
    }

    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (ext === 'js')   return 'file-json-2';
        if (ext === 'css')  return 'paintbrush';
        if (ext === 'html') return 'layout-template';
        if (ext === 'json') return 'braces';
        if (ext === 'md')   return 'file-text';
        if (ext === 'ts')   return 'file-code-2';
        if (ext === 'txt')  return 'file-text';
        return 'file-code';
    }

    function getFileColor(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (ext === 'js')   return '#f7df1e';
        if (ext === 'css')  return '#264de4';
        if (ext === 'html') return '#e34c26';
        if (ext === 'json') return '#cbcb41';
        if (ext === 'md')   return '#519aba';
        if (ext === 'ts')   return '#3178c6';
        if (ext === 'txt')  return '#9ca3af';
        return '#8b949e';
    }

    function renderTabs() {
        const bar = document.getElementById('tab-bar');
        bar.innerHTML = '';
        openTabs.forEach(path => {
            const name = path.split('/').pop();
            const div = document.createElement('div');
            div.className = `tab ${path === activeFile ? 'active' : ''}`;
            div.innerHTML = `<span>${name}</span><i data-lucide="x" class="tab-close" style="width:14px" onclick="event.stopPropagation();closeTab('${path}')"></i>`;
            div.onclick = () => switchFile(path);
            bar.appendChild(div);
        });
        lucide.createIcons();
    }

    function closeTab(path) {
        openTabs = openTabs.filter(p => p !== path);
        if (activeFile === path) {
            if (openTabs.length > 0) switchFile(openTabs[0]);
            else { activeFile = null; editor.setModel(null); }
        }
        renderTabs();
        saveState();
    }

    function createItem(type, targetFolderPath) {
        const name = prompt(`Enter ${type} name (e.g. ${type === 'file' ? 'app.js or folder/app.js' : 'images'}):`);
        if (!name || !name.trim()) return;
        const raw = name.trim();

        let baseContainer = files;
        let basePath = '';
        if (targetFolderPath) {
            const node = getFileNode(targetFolderPath);
            if (node && node.type === 'folder') {
                baseContainer = node.children;
                basePath = targetFolderPath + '/';
            }
        }

        if (type === 'file') {
            const segments = raw.split('/').filter(Boolean);
            if (segments.length === 0) return;

            let container = baseContainer;
            let pathAccum = basePath;

            for (let i = 0; i < segments.length - 1; i++) {
                const seg = segments[i];
                if (!container[seg]) {
                    container[seg] = { type: 'folder', children: {} };
                }
                if (container[seg].type !== 'folder') {
                    alert(`'${seg}' exists as a file, cannot create folder.`);
                    return;
                }
                pathAccum += seg + '/';
                container = container[seg].children;
            }

            const fileName = segments[segments.length - 1];
            if (container[fileName]) { alert('Name already exists.'); return; }
            container[fileName] = { type: 'file', content: '' };
            setupModels({ [fileName]: container[fileName] }, pathAccum);
            switchFile(pathAccum + fileName);
        } else {
            const segments = raw.split('/').filter(Boolean);
            let container = baseContainer;
            let pathAccum = basePath;
            for (let seg of segments) {
                if (!container[seg]) {
                    container[seg] = { type: 'folder', children: {} };
                }
                pathAccum += seg + '/';
                container = container[seg].children;
            }
        }

        saveToLocalStorage();
        renderTree();
    }

    function countHtmlFiles(obj) {
        let count = 0;
        for (let k in obj) {
            if (obj[k].type === 'file' && k.endsWith('.html')) count++;
            if (obj[k].type === 'folder') count += countHtmlFiles(obj[k].children);
        }
        return count;
    }

    function deleteItem(path) {
        const { parent, name } = getParentAndName(path);
        if (!parent || !parent[name]) return;

        if (parent[name].type === 'file' && name.endsWith('.html')) {
            if (countHtmlFiles(files) <= 1) {
                alert('Cannot delete: you must keep at least one HTML file.');
                return;
            }
        }

        disposeModels(parent[name], path);
        delete parent[name];

        openTabs = openTabs.filter(p => !p.startsWith(path));
        if (!openTabs.includes(activeFile)) {
            activeFile = openTabs.length > 0 ? openTabs[0] : null;
            if (activeFile) switchFile(activeFile);
            else editor.setModel(null);
        } else {
            renderTabs();
        }
        saveToLocalStorage();
        renderTree();
        saveState();
    }

    function disposeModels(node, path) {
        if (node.type === 'file') {
            const m = monaco.editor.getModel(monaco.Uri.parse(`file:///${path}`));
            if (m) m.dispose();
        } else if (node.children) {
            for (let k in node.children) disposeModels(node.children[k], path + '/' + k);
        }
    }

    function startRename(path) {
        const item = document.querySelector(`.tree-item[data-path="${CSS.escape(path)}"]`);
        if (!item) return;
        const { parent, name } = getParentAndName(path);
        if (!parent) return;
        const span = item.querySelector('span');
        const input = document.createElement('input');
        input.className = 'tree-rename-input';
        input.value = name;
        span.replaceWith(input);
        input.focus();
        input.select();

        const commit = () => {
            const newName = input.value.trim();
            if (!newName || newName === name) { renderTree(); return; }
            if (parent[newName]) { alert('Name already exists.'); renderTree(); return; }

            const node = parent[name];
            if (node.type === 'file') {
                const oldUri = monaco.Uri.parse(`file:///${path}`);
                const newPath = path.slice(0, path.lastIndexOf('/') + 1) + newName;
                const newUri = monaco.Uri.parse(`file:///${newPath}`);
                const oldModel = monaco.editor.getModel(oldUri);
                const content = oldModel ? oldModel.getValue() : node.content;
                if (oldModel) oldModel.dispose();
                if (!monaco.editor.getModel(newUri)) {
                    monaco.editor.createModel(content, getMonacoLang(newName), newUri);
                }
                node.content = content;
                openTabs = openTabs.map(p => p === path ? newPath : p);
                if (activeFile === path) activeFile = newPath;
            } else if (node.type === 'folder') {
                const oldPrefix = path + '/';
                const newPrefix = path.slice(0, path.lastIndexOf('/') + 1) + newName + '/';
                renameFolderModels(node, oldPrefix, newPrefix);
                openTabs = openTabs.map(p => p.startsWith(oldPrefix) ? newPrefix + p.slice(oldPrefix.length) : p);
                if (activeFile && activeFile.startsWith(oldPrefix)) {
                    activeFile = newPrefix + activeFile.slice(oldPrefix.length);
                }
            }

            parent[newName] = node;
            delete parent[name];
            saveToLocalStorage();
            if (activeFile) switchFile(activeFile);
            else renderTree();
            saveState();
        };

        input.addEventListener('blur', commit);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') input.blur();
            if (e.key === 'Escape') { input.removeEventListener('blur', commit); renderTree(); }
        });
    }

    function renameFolderModels(folderNode, oldPrefix, newPrefix) {
        for (let k in folderNode.children) {
            const child = folderNode.children[k];
            const oldPath = oldPrefix + k;
            const newPath = newPrefix + k;
            if (child.type === 'file') {
                const oldUri = monaco.Uri.parse(`file:///${oldPath}`);
                const newUri = monaco.Uri.parse(`file:///${newPath}`);
                const oldModel = monaco.editor.getModel(oldUri);
                const content = oldModel ? oldModel.getValue() : child.content;
                if (oldModel) oldModel.dispose();
                if (!monaco.editor.getModel(newUri)) {
                    monaco.editor.createModel(content, getMonacoLang(k), newUri);
                }
                child.content = content;
            } else if (child.type === 'folder') {
                renameFolderModels(child, oldPath + '/', newPath + '/');
            }
        }
    }

    async function downloadFolderAsZip(path) {
        const node = getFileNode(path);
        if (!node || node.type !== 'folder') return;
        const zip = new JSZip();
        const folderName = path.split('/').pop();

        function addToZip(zipFolder, obj, basePath) {
            for (let k in obj) {
                const child = obj[k];
                if (child.type === 'file') {
                    const fullPath = basePath + k;
                    const model = monaco.editor.getModel(monaco.Uri.parse(`file:///${fullPath}`));
                    const content = model ? model.getValue() : (child.content || '');
                    zipFolder.file(k, content);
                } else if (child.type === 'folder') {
                    const sub = zipFolder.folder(k);
                    addToZip(sub, child.children, basePath + k + '/');
                }
            }
        }

        addToZip(zip, node.children, path + '/');
        const blob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = folderName + '.zip';
        a.click();
        URL.revokeObjectURL(a.href);
    }

    async function downloadProject() {
        const totalFiles = countFilesInTree(files);

        if (totalFiles === 1) {
            const singleFile = findFirstFile(files);
            if (singleFile) {
                downloadFile(singleFile);
                return;
            }
        }

        const zip = new JSZip();

        function addToZip(zipFolder, obj, pathPrefix = '') {
            for (let k in obj) {
                const child = obj[k];
                if (child.type === 'file') {
                    const fullPath = pathPrefix + k;
                    const model = monaco.editor.getModel(monaco.Uri.parse(`file:///${fullPath}`));
                    const content = model ? model.getValue() : (child.content || '');
                    zipFolder.file(k, content);
                } else if (child.type === 'folder') {
                    const sub = zipFolder.folder(k);
                    addToZip(sub, child.children, pathPrefix + k + '/');
                }
            }
        }

        addToZip(zip, files);
        const blob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'project.zip';
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function downloadFile(path) {
        const content = getFileContent(path);
        const name = path.split('/').pop();
        const ext = name.split('.').pop().toLowerCase();
        const mimeMap = { html: 'text/html', css: 'text/css', js: 'application/javascript', json: 'application/json', ts: 'application/typescript', md: 'text/markdown', txt: 'text/plain' };
        const mime = mimeMap[ext] || 'text/plain';
        const blob = new Blob([content], { type: mime });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function getFileContent(path) {
        const model = monaco.editor.getModel(monaco.Uri.parse(`file:///${path}`));
        if (model) return model.getValue();
        const node = getFileNode(path);
        return node ? node.content || '' : '';
    }

    function setupContextMenu() {
        const sidebar = document.getElementById('sidebar');
        const menu = document.getElementById('vs-context-menu');

        sidebar.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const item = e.target.closest('.tree-item');
            ctxTarget = item ? item.getAttribute('data-path') : null;
            ctxTargetIsFolder = item ? item.getAttribute('data-type') === 'folder' : false;
            showContextMenuAt(e.clientX, e.clientY);
        });

        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target)) hideContextMenu();
        });
    }

    function showContextMenuAt(x, y) {
        const menu = document.getElementById('vs-context-menu');
        const hasTarget = !!ctxTarget;

        document.getElementById('ctx-new-file').style.display = '';
        document.getElementById('ctx-new-folder').style.display = '';
        document.getElementById('ctx-upload-file').style.display = '';
        document.getElementById('ctx-divider-1').style.display = hasTarget ? '' : 'none';

        if (!hasTarget) {
            ['ctx-cut','ctx-copy','ctx-rename','ctx-download','ctx-delete','ctx-divider-2'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
        } else if (ctxTargetIsFolder) {
            document.getElementById('ctx-cut').style.display = 'none';
            document.getElementById('ctx-copy').style.display = 'none';
            document.getElementById('ctx-rename').style.display = '';
            document.getElementById('ctx-download').style.display = '';
            document.getElementById('ctx-delete').style.display = '';
            document.getElementById('ctx-divider-2').style.display = '';
        } else {
            ['ctx-cut','ctx-copy','ctx-rename','ctx-download','ctx-delete','ctx-divider-2'].forEach(id => {
                document.getElementById(id).style.display = '';
            });
        }

        menu.style.display = 'block';
        const mw = menu.offsetWidth, mh = menu.offsetHeight;
        let lx = x, ty = y;
        if (lx + mw > window.innerWidth) lx = window.innerWidth - mw - 6;
        if (ty + mh > window.innerHeight) ty = window.innerHeight - mh - 6;
        menu.style.left = lx + 'px';
        menu.style.top  = ty + 'px';
    }

    function hideContextMenu() {
        document.getElementById('vs-context-menu').style.display = 'none';
    }

    function handleContext(action) {
        hideContextMenu();
        switch (action) {
            case 'new-file':
                createItem('file', ctxTargetIsFolder ? ctxTarget : null);
                break;
            case 'new-folder':
                createItem('folder', ctxTargetIsFolder ? ctxTarget : null);
                break;
            case 'upload-file':
                triggerUploadForFolder(ctxTargetIsFolder ? ctxTarget : null);
                break;
            case 'cut':
                if (!ctxTarget) break;
                clipboard = { action: 'cut', path: ctxTarget, content: getFileContent(ctxTarget) };
                break;
            case 'copy':
                if (!ctxTarget) break;
                clipboard = { action: 'copy', path: ctxTarget, content: getFileContent(ctxTarget) };
                break;
            case 'rename':
                if (ctxTarget) startRename(ctxTarget);
                break;
            case 'download':
                if (!ctxTarget) break;
                if (ctxTargetIsFolder) downloadFolderAsZip(ctxTarget);
                else downloadFile(ctxTarget);
                break;
            case 'delete':
                if (ctxTarget && confirm(`Delete '${ctxTarget}'?`)) deleteItem(ctxTarget);
                break;
        }
    }

    function setupUploadZone() {
        const zone = document.getElementById('upload-zone');
        const card = document.getElementById('upload-card');
        const input = document.getElementById('file-input-upload');

        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('show');
            card.classList.add('drag-over');
        });

        zone.addEventListener('dragleave', (e) => {
            if (e.target === zone) {
                card.classList.remove('drag-over');
                zone.classList.remove('show');
            }
        });

        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            card.classList.remove('drag-over');
            zone.classList.remove('show');
            handleUploadedFiles(e.dataTransfer.files);
        });

        input.addEventListener('change', (e) => {
            handleUploadedFiles(e.target.files);
            hideUploadZone();
            input.value = '';
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('show');
        });

        document.addEventListener('dragleave', (e) => {
            if (e.clientX === 0 && e.clientY === 0) {
                zone.classList.remove('show');
            }
        });
    }

    function showUploadZone() {
        document.getElementById('upload-zone').classList.add('show');
    }

    function hideUploadZone() {
        document.getElementById('upload-zone').classList.remove('show');
    }

    function triggerUploadForFolder(folderPath) {
        const input = document.getElementById('file-input-upload');
        input.dataset.targetFolder = folderPath || '';
        input.click();
    }

    function handleUploadedFiles(fileList, targetFolderPath) {
        const files_array = Array.from(fileList);
        let uploadedCount = 0;

        files_array.forEach(file => {
            const ext = file.name.split('.').pop().toLowerCase();
            if (!SUPPORTED_UPLOAD_TYPES.includes(ext)) {
                console.warn(`Skipped unsupported file: ${file.name}`);
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const filename = file.name;

                let baseContainer = files;
                let basePath = '';
                if (targetFolderPath) {
                    const node = getFileNode(targetFolderPath);
                    if (node && node.type === 'folder') {
                        baseContainer = node.children;
                        basePath = targetFolderPath + '/';
                    }
                }

                if (!baseContainer[filename]) {
                    baseContainer[filename] = { type: 'file', content: content };
                    const uri = monaco.Uri.parse(`file:///${basePath}${filename}`);
                    if (!monaco.editor.getModel(uri)) {
                        monaco.editor.createModel(content, getMonacoLang(filename), uri);
                    }
                    switchFile(basePath + filename);
                    uploadedCount++;
                } else {
                    console.warn(`File already exists: ${filename}`);
                }
            };
            reader.readAsText(file);
        });

        setTimeout(() => {
            if (uploadedCount > 0) {
                saveToLocalStorage();
                renderTree();
            }
        }, 100);
    }

    function applyThemeToUI(theme) {
        const previewSection = document.getElementById('preview-section');
        const previewFrame   = document.getElementById('preview-frame');

        previewSection.classList.remove('theme-dark', 'theme-hc');

        if (theme === 'vs-dark') {
            previewSection.classList.add('theme-dark');
        } else if (theme === 'hc-black') {
            previewSection.classList.add('theme-hc');
        }

        const src = previewFrame.src || '';
        const hasContent = src.startsWith('blob:') || (src !== '' && src !== window.location.href);
        if (!hasContent) {
            if (theme === 'vs') {
                previewFrame.style.background = '#ffffff';
            } else if (theme === 'vs-dark') {
                previewFrame.style.background = '#1e1e1e';
            } else if (theme === 'hc-black') {
                previewFrame.style.background = '#000000';
            }
        }
    }

    function applySettings(save = true) {
        const settings = {
            theme:      document.getElementById('set-theme').value,
            lineheight: parseFloat(document.getElementById('set-lineheight').value),
            wrap:       document.getElementById('set-wordwrap').value,
            glass:      document.getElementById('set-glass').checked,
            numbers:    document.getElementById('set-numbers').checked,
            autorun:    document.getElementById('set-autorun').checked,
            baseurl:    document.getElementById('set-baseurl').value.trim()
        };
        if (editor) {
            monaco.editor.setTheme(settings.theme);
            editor.updateOptions({
                lineHeight:  settings.lineheight * 14,
                wordWrap:    settings.wrap,
                lineNumbers: settings.numbers ? 'on' : 'off'
            });
        }
        const sidebar = document.getElementById('sidebar');
        settings.glass ? sidebar.classList.add('glass-sidebar') : sidebar.classList.remove('glass-sidebar');
        const ari = document.getElementById('auto-run-status');
        ari.innerHTML = `<div style="width:8px;height:8px;border-radius:50%;background:${settings.autorun ? 'var(--accent)' : 'var(--text-dim)'};"></div> Auto-run: ${settings.autorun ? 'ON' : 'OFF'}`;

        applyThemeToUI(settings.theme);

        if (save) { localStorage.setItem('ituze_settings', JSON.stringify(settings)); updatePreview(); }
    }

    function toggleSettings() {
        if (openPanel === 'settings') {
            closePanelByName('settings');
        } else {
            openPanelExclusive('settings');
        }
    }

    function resizePreview(device) {
        const frame = document.getElementById('preview-frame');
        frame.className = '';
        if (device === 'mobile') frame.classList.add('preview-mobile');
        if (device === 'tablet') frame.classList.add('preview-tablet');
    }

    function normalizeBaseUrl(url) {
        if (!url) return '';
        const trimmed = url.trim();
        if (!trimmed) return '';
        if (!trimmed.startsWith('http://') && !trimmed.startsWith('https://')) {
            return 'https://' + trimmed;
        }
        if (!trimmed.endsWith('/')) {
            return trimmed + '/';
        }
        return trimmed;
    }

    function injectBaseTag(html, baseUrl) {
        if (!baseUrl) return html;

        html = html.replace(/<base[^>]*>/gi, '');

        const headMatch = html.match(/<head[^>]*>/i);
        if (headMatch) {
            const headEnd = headMatch.index + headMatch[0].length;
            const baseTag = `\n<base href="${baseUrl}">`;
            return html.slice(0, headEnd) + baseTag + html.slice(headEnd);
        }

        const docStart = html.match(/<!DOCTYPE|<html/i);
        if (docStart) {
            const insertPos = docStart.index + docStart[0].length;
            const head = `<head><base href="${baseUrl}"></head>`;
            return html.slice(0, insertPos) + head + html.slice(insertPos);
        }

        return `<head><base href="${baseUrl}"></head>` + html;
    }

    function updatePreview() {
        let targetHtmlFile = (activeFile && activeFile.endsWith('.html')) ? activeFile : 'index.html';
        const htmlModel = monaco.editor.getModel(monaco.Uri.parse(`file:///${targetHtmlFile}`));
        const cssModel  = monaco.editor.getModel(monaco.Uri.parse('file:///style.css'));
        const jsModel   = monaco.editor.getModel(monaco.Uri.parse('file:///script.js'));

        const htmlContent = htmlModel ? htmlModel.getValue() : '<h1>Error: No HTML file found</h1>';
        const cssContent  = cssModel  ? cssModel.getValue()  : '';
        const jsContent   = jsModel   ? jsModel.getValue()   : '';

        let compiled = htmlContent;
        const baseUrl = normalizeBaseUrl(document.getElementById('set-baseurl').value);
        compiled = injectBaseTag(compiled, baseUrl);

        if (compiled.includes('</head>')) {
            compiled = compiled.replace('</head>', `\n<style>${cssContent}</style>\n</head>`);
        } else {
            compiled = `<style>${cssContent}</style>` + compiled;
        }
        if (compiled.includes('</body>')) {
            compiled = compiled.replace('</body>', `\n<script>${jsContent}<\/script>\n</body>`);
        } else {
            compiled += `\n<script>${jsContent}<\/script>`;
        }

        const blob = new Blob([compiled], { type: 'text/html' });
        const frame = document.getElementById('preview-frame');
        frame.src = URL.createObjectURL(blob);
        frame.onload = () => { frame.style.background = ''; };
    }

    function openInNewTab() {
        updatePreview();
        setTimeout(() => {
            const frameSrc = document.getElementById('preview-frame').src;
            window.open(frameSrc, '_blank');
        }, 200);
    }

    function saveToLocalStorage() {
        const syncContent = (obj, path = '') => {
            for (let key in obj) {
                const fullPath = path + key;
                if (obj[key].type === 'file') {
                    const model = monaco.editor.getModel(monaco.Uri.parse(`file:///${fullPath}`));
                    if (model) obj[key].content = model.getValue();
                } else if (obj[key].children) {
                    syncContent(obj[key].children, fullPath + '/');
                }
            }
        };
        syncContent(files);
        try {
            localStorage.setItem('ituze_files', JSON.stringify(files));
        } catch(e) {
            console.warn('localStorage quota exceeded.');
        }
        saveState();
    }

    function setupItuzePanel() {
        const btn = document.getElementById('topLink');
        const panel = document.getElementById('iframePanel');
        const content = document.getElementById('iframePanelContent');

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (openPanel === 'ituze') {
                closePanelByName('ituze');
                return;
            }
            content.innerHTML = '';
            const iframe = document.createElement('iframe');
            iframe.src = '/apps';
            iframe.title = 'Ituze';
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            content.appendChild(iframe);
            openPanelExclusive('ituze');
        });
    }

    function setupResizer() {
        const resizer = document.getElementById('resizer');
        const editorCont = document.getElementById('editor-container');
        const previewSect = document.getElementById('preview-section');
        const iframe = document.getElementById('preview-frame');
        let isResizing = false;

        const stopResize = () => {
            if (isResizing) {
                isResizing = false;
                resizer.classList.remove('active');
                iframe.style.pointerEvents = 'auto';
            }
        };

        resizer.addEventListener('mousedown', () => {
            isResizing = true;
            resizer.classList.add('active');
            iframe.style.pointerEvents = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let offset = e.clientX - 260;
            let percent = (offset / (window.innerWidth - 260)) * 100;
            percent = Math.max(15, Math.min(85, percent));
            editorCont.style.flex = `0 0 ${percent}%`;
            previewSect.style.width = `${100 - percent}%`;
        });

        window.addEventListener('mouseup', stopResize);
        window.addEventListener('mouseleave', stopResize);
        window.addEventListener('blur', stopResize);
    }
