<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Ituze</title>
      <script src="/analytics.js"></script>
      <script src="/scrollbar.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #38bdf8; --glass: rgba(255, 255, 255, 0.03); }
        html, body { scrollbar-width: none; background: #020617; color: white; font-family: 'Inter', sans-serif; margin: 0; height: 100%; }
        *::-webkit-scrollbar { display: none !important; }
        body {
            background-image: radial-gradient(circle at top, #0b1120 0%, #020617 60%, #000 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .feedback-container {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); text-align: center;
        }
        h1 { font-size: 32px; letter-spacing: -1px; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input, textarea {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(0,0,0,0.5); }
        .stars { font-size: 38px; color: #1e293b; cursor: pointer; display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .star.active { color: #fbbf24; filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.3)); }
        .submit-btn {
            width: 100%; padding: 16px; background: white; color: #020617;
            border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s ease;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        .submit-btn:disabled { opacity: 0.5; cursor: wait; }
        #success { display: none; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="feedback-container">
    <div id="form-wrapper">
        <h1>Feedback</h1>
        <p class="subtitle">How can we make Ituze even better for you?</p>
        
        <form id="feedbackForm">
            <div class="stars">
                <span class="star active" data-v="1">&#9733;</span>
                <span class="star active" data-v="2">&#9733;</span>
                <span class="star active" data-v="3">&#9733;</span>
                <span class="star active" data-v="4">&#9733;</span>
                <span class="star active" data-v="5">&#9733;</span>
            </div>
            <input type="hidden" name="rating" id="ratingValue" value="5">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Optional">
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" required rows="4" placeholder="Your thoughts..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="subBtn">Send Feedback</button>
        </form>
    </div>

    <div id="success">
        <div style="font-size: 50px;">✨</div>
        <h2>Sent Successfully</h2>
        <p style="color: #94a3b8;">Your feedback is now on its way.</p>
        <a href="/" style="color: var(--accent); text-decoration: none; font-size: 14px;">← Back Home</a>
    </div>
</div>

<script>
    const FORMSPREE_URL = 'https://formspree.io/f/xkovqnpn';

    // Star Handling
    const stars = document.querySelectorAll('.star');
    stars.forEach((s, i) => {
        s.onclick = () => {
            document.getElementById('ratingValue').value = i + 1;
            stars.forEach((ss, ii) => ss.classList.toggle('active', ii <= i));
        };
    });

    // Form Submission
    const form = document.getElementById('feedbackForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('subBtn');
        btn.disabled = true;
        btn.innerText = "Sending...";

        // Formspree works best with standard FormData or JSON
        const data = new FormData(form);

        try {
            const response = await fetch(FORMSPREE_URL, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                document.getElementById('form-wrapper').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            } else {
                throw new Error('Server error');
            }
        } catch (err) {
            alert("Oops! Something went wrong. Check your connection.");
            btn.disabled = false;
            btn.innerText = "Send Feedback";
        }
    };
</script>
</body>
</html>
