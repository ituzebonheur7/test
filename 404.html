<!DOCTYPE html>
<html lang="en">
  <script src="/analytics.js"></script>
<head>
  <meta charset="utf-8">
  <link rel="icon" href="ituze.png" type="image/png">
  <title>404 Page Not Found - Ituze</title>
  <style>
    body {
      background-color: #121212; 
      color: #e0e0e0;
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .container { 
      margin: 50px auto 40px auto; 
      width: 600px; 
      text-align: center; 
    }

    a { color: #58a6ff; text-decoration: none; } 
    a:hover { text-decoration: underline; }

    h1 { 
      width: 800px; 
      position: relative; 
      left: -100px; 
      letter-spacing: -1px; 
      line-height: 60px; 
      font-size: 60px; 
      font-weight: 100; 
      margin: 0px 0 30px 0; 
      color: #ffffff; 
      text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
    }

    p { 
      color: rgba(255, 255, 255, 0.7);
      margin: 20px 0; 
      line-height: 1.6; 
      font-size: 18px;
    }

    ul { list-style: none; margin: 25px 0; padding: 0; }
    li { display: table-cell; font-weight: bold; width: 1%; }

    #suggestions {
      margin-top: 50px;
      color: #8b949e;
    }
    
    #suggestions a {
      color: #8b949e;
      font-weight: 200;
      font-size: 14px;
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    
    <p><strong>That’s an error.</strong></p>
    <p>The requested URL was not found on this server.<br>That’s all we know.</p>
    
    <div id="suggestions">
      <a href="/">Return to Homepage</a>
    </div>
  </div>
</body>
</html>
