<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ituze Search | Redirecting...</title>
    
    <link rel="icon" href="/ituze.png" type="image/png">

    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* Loading Animation Styles */
        .loading-text {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite;
        }

        .loader-container {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .loader-bar {
            position: absolute;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #00d4ff, #ffffff, #00d4ff, transparent);
            animation: scan 0.7s infinite linear;
        }

        /* Setup UI Styles (Hidden by default) */
        #setup-ui {
            display: none;
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        select {
            padding: 12px;
            background: #1a1a1a;
            color: #00d4ff;
            border: 1px solid #333;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 1rem;
            outline: none;
            width: 200px;
        }

        button {
            margin-top: 25px;
            padding: 12px 30px;
            background: #00d4ff;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: #ffffff;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.4; text-shadow: 0 0 0px #fff; }
            50% { opacity: 1; text-shadow: 0 0 10px #00d4ff; }
        }

        @keyframes scan {
            from { left: -100%; }
            to { left: 100%; }
        }
    </style>
</head>
<body>

    <div id="redirect-ui">
        <div class="loading-text">Redirecting</div>
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <div id="setup-ui">
        <div class="loading-text">Select Search Engine</div>
        <p style="opacity: 0.7; font-size: 0.9rem; margin-top: 10px;">
            Choose a default engine for your searches.
        </p>
        <select id="engine-selector">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="brave">Brave</option>
            <option value="startpage">Startpage</option>
            <option value="you">You.com</option>
        </select>
        <br>
        <button onclick="saveAndRedirect()">Save and Search</button>
    </div>

    <script src="/analytics.js"></script>

    <script>
        // Search Engine Mapping
        const searchEngines = {
            google: "https://www.google.com/search?q=",
            bing: "https://www.bing.com/search?q=",
            duckduckgo: "https://duckduckgo.com/?q=",
            brave: "https://search.brave.com/search?q=",
            startpage: "https://www.startpage.com/do/search?query=",
            you: "https://you.com/search?q="
        };

        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const savedEngine = localStorage.getItem('defaultSearchEngine');

            // 1. If no search term is entered, redirect back to homepage immediately
            if (!query || query.trim() === "") {
                window.location.replace("https://ituzebonheur.com");
                return;
            }

            // 2. If we have a query AND a saved engine, redirect with the animation
            if (savedEngine && searchEngines[savedEngine]) {
                const destination = searchEngines[savedEngine] + encodeURIComponent(query);
                
                // Slight delay so the user sees your clean loading animation
                setTimeout(() => {
                    window.location.replace(destination);
                }, 800);
            } 
            // 3. If we have a query but NO saved engine, show the setup UI
            else {
                document.getElementById('redirect-ui').style.display = 'none';
                document.getElementById('setup-ui').style.display = 'block';
            }
        })();

        function saveAndRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const selection = document.getElementById('engine-selector').value;

            if (selection && query) {
                localStorage.setItem('defaultSearchEngine', selection);

                // Redirect to the chosen engine
                const destination = searchEngines[selection] + encodeURIComponent(query);
                window.location.replace(destination);
            }
        }
    </script>
</body>
</html>
