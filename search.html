```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search Redirect</title>

<link rel="icon" href="images/ituze.png" type="image/png">
<link rel="search" type="application/opensearchdescription+xml" title="Ituze Search" href="/opensearch.xml">

<script src="/analytics.js"></script>

<style>
/* Fully hidden page */
html,body{
margin:0;
padding:0;
background:#000;
display:none;
}
</style>

</head>
<body>

<script>

/* ---------------------------
   Suggested engines fallback
--------------------------- */

const suggestedEngines = [
"google",
"bing",
"duckduckgo",
"google"
];


/* ---------------------------
   Search engine endpoints
--------------------------- */

const searchEngines = {

google: "https://www.google.com/search?q=",

googleai: "https://www.google.com/aimode?q=",

bing: "https://www.bing.com/search?q=",

duckduckgo: "https://duckduckgo.com/?q=",

brave: "https://search.brave.com/search?q=",

startpage: "https://www.startpage.com/do/search?query=",

you: "https://you.com/search?q=",

ecosia: "https://www.ecosia.org/search?q=",

yahoo: "https://search.yahoo.com/search?p=",

yandex: "https://yandex.com/search/?text=",

perplexity: "https://www.perplexity.ai/search?q="

};


/* tracking */
const utmSource = "ituzebonheur.com";


(function(){

const params = new URLSearchParams(location.search);

const query = params.get("q") || "";
const suggest = params.get("suggest");


/* ---------------------------
   Suggestion endpoint
--------------------------- */

if(suggest !== null){

const suggestions = [

"https://google.com/search?q=" + query,

"https://bing.com/search?q=" + query,

"https://duckduckgo.com/?q=" + query + "&type=list",

"https://google.com/search?q=" + query

];

const response = [
query,
suggestions,
suggestions,
suggestions
];

document.write(JSON.stringify(response));

return;

}


/* ---------------------------
   Empty query protection
--------------------------- */

if(!query.trim()){

location.replace("https://ituzebonheur.com");

return;

}


/* ---------------------------
   Engine selection
--------------------------- */

let engine = localStorage.getItem("defaultSearchEngine");

if(!engine){

engine = suggestedEngines[
Math.floor(Math.random()*suggestedEngines.length)
];

localStorage.setItem("defaultSearchEngine",engine);

}


/* fallback safety */

if(!searchEngines[engine]){
engine="google";
}


/* ---------------------------
   Redirect
--------------------------- */

const destination =
searchEngines[engine]
+ encodeURIComponent(query)
+ "&utm_source="
+ encodeURIComponent(utmSource);


location.replace(destination);

})();

</script>

</body>
</html>
```
