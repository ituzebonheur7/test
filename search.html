<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ituze Search</title>
    <link rel="icon" href="/ituze.png" type="image/png">
    
    <style>
        /* Basic Matrix/Dark Theme Styling */
        body {
            background-color: #000;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .search-container {
            text-align: center;
        }

        input[type="text"] {
            padding: 12px;
            width: 300px;
            background: #111;
            border: 1px solid #00FF41;
            color: #00FF41;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background: #00FF41;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* The First-Time Setup Modal */
        #setup-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .setup-box {
            border: 2px solid #00FF41;
            padding: 30px;
            background: #000;
            text-align: center;
            border-radius: 8px;
        }

        select {
            padding: 10px;
            margin-top: 15px;
            background: #222;
            color: #00FF41;
            border: 1px solid #00FF41;
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-box">
            <h2>Welcome to Ituze Search</h2>
            <p>Choose your default search engine to get started:</p>
            <select id="engine-selector">
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="duckduckgo">DuckDuckGo</option>
                <option value="brave">Brave</option>
                <option value="startpage">Startpage</option>
                <option value="you">You.com</option>
            </select>
            <br><br>
            <button onclick="saveDefaultEngine()">Save and Search</button>
        </div>
    </div>

    <div class="search-container">
        <h1>ITUZE</h1>
        <form id="search-form" onsubmit="handleSearch(event)">
            <input type="text" id="search-input" placeholder="Enter search query..." autofocus>
            <button type="submit">Search</button>
        </form>
        <p style="font-size: 0.8em; margin-top: 10px; opacity: 0.6;">
            Engine: <span id="current-engine-display">Not Set</span>
        </p>
    </div>

    <script>
        const searchEngines = {
            google: "https://www.google.com/search?q=",
            bing: "https://www.bing.com/search?q=",
            duckduckgo: "https://duckduckgo.com/?q=",
            brave: "https://search.brave.com/search?q=",
            startpage: "https://www.startpage.com/do/search?query=",
            you: "https://you.com/search?q="
        };

        // 1. Check if user has a saved engine on page load
        window.onload = function() {
            const savedEngine = localStorage.getItem('defaultSearchEngine');
            if (!savedEngine) {
                // First time visitor: show setup
                document.getElementById('setup-overlay').style.display = 'flex';
            } else {
                document.getElementById('current-engine-display').innerText = savedEngine;
            }
        };

        // 2. Save the selection and close the setup
        function saveDefaultEngine() {
            const selected = document.getElementById('engine-selector').value;
            localStorage.setItem('defaultSearchEngine', selected);
            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('current-engine-display').innerText = selected;
            
            // Focus the search input after setup
            document.getElementById('search-input').focus();
        }

        // 3. Handle the actual search
        function handleSearch(event) {
            event.preventDefault();
            const query = document.getElementById('search-input').value;
            const engineKey = localStorage.getItem('defaultSearchEngine');

            if (!engineKey) {
                // If they bypassed the modal somehow, show it
                document.getElementById('setup-overlay').style.display = 'flex';
                return;
            }

            if (query.trim() !== "") {
                const baseUrl = searchEngines[engineKey];
                window.location.href = baseUrl + encodeURIComponent(query);
            }
        }
    </script>
</body>
</html>
