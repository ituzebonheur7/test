<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <link rel="icon" href="images/ituze.png" type="image/png">
    
    <style>
        /* Hidden background to prevent white flashes */
        html, body {
            background-color: #0a0a0a;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: none;
        }
    </style>

    <script>
        // Configuration
        const engines = {
            google: "https://www.google.com/search?q=",
            googleai: "https://www.google.com/aimode?q=",
            bing: "https://www.bing.com/search?q=",
            duckduckgo: "https://duckduckgo.com/?q=",
            brave: "https://search.brave.com/search?q=",
            startpage: "https://www.startpage.com/do/search?query=",
            you: "https://you.com/search?q=",
            perplexity: "https://www.perplexity.ai/search?q="
        };

        const utmSource = "ituzebonheur.com";

        // Math Logic
        function isMathExpression(q) {
            const trimmed = q.trim();
            if (/[a-zA-Z]/.test(trimmed)) return false;
            return /^[0-9\s\+\-\*\/\.\%\(\)]+$/.test(trimmed) && /[0-9]/.test(trimmed);
        }

        function safeCalc(expr) {
            try {
                const sanitized = expr.replace(/[^0-9+\-*/().%\s]/g, "");
                const res = Function('"use strict";return (' + sanitized + ')')();
                return (typeof res === "number" && isFinite(res)) ? res : null;
            } catch (e) { return null; }
        }

        // History Management
        function saveToHistory(query) {
            let history = JSON.parse(localStorage.getItem("searchHistory") || "[]");
            history = [query, ...history.filter(item => item !== query)].slice(0, 10);
            localStorage.setItem("searchHistory", JSON.stringify(history));
        }

        (function() {
            const params = new URLSearchParams(window.location.search);
            const query = params.get("q");

            // 1. If no query, return to home
            if (!query || !query.trim()) {
                window.location.replace("https://ituzebonheur.com");
                return;
            }

            const cleanQuery = query.trim();

            // 2. Local Features: Math & History
            saveToHistory(cleanQuery);
            
            let finalQuery = cleanQuery;
            if (isMathExpression(cleanQuery)) {
                const result = safeCalc(cleanQuery);
                if (result !== null) {
                    // If it's a math expression, we can either search the result 
                    // or keep the expression. Most users prefer searching the result.
                    finalQuery = result.toString();
                }
            }

            // 3. Engine Selection
            // Uses saved engine or defaults to Google
            const savedEngine = localStorage.getItem("defaultSearchEngine") || "google";
            const baseUrl = engines[savedEngine] || engines.google;

            // 4. Final Redirect
            const destination = baseUrl + encodeURIComponent(finalQuery) + "&utm_source=" + encodeURIComponent(utmSource);
            window.location.replace(destination);
        })();
    </script>
</head>
<body>
    </body>
</html>
