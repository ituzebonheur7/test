<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/analytics.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Embed - Ituze</title>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0f0f0f;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 95%;
        max-width: 900px;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: #fff;
        font-size: 16px;
        outline: none;
    }

    input:focus {
        border-color: #ff0000;
    }

    button {
        margin-top: 15px;
        padding: 12px 25px;
        background: #ff0000;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s ease;
    }

    button:hover {
        background: #cc0000;
    }

    .video-wrapper {
        margin-top: 30px;
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }

    .error {
        margin-top: 20px;
        color: #ff4c4c;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Paste YouTube Link</h1>
    <input type="text" id="youtubeUrl" placeholder="Paste YouTube link here...">
    <button onclick="generateEmbed()">Load Video</button>
    <div id="result"></div>
</div>

<script>
function extractVideoID(url) {
    try {
        let parsed = new URL(url);

        // youtu.be short link
        if (parsed.hostname.includes("youtu.be")) {
            return parsed.pathname.slice(1);
        }

        // youtube.com link
        if (parsed.searchParams.get("v")) {
            return parsed.searchParams.get("v");
        }

        return null;
    } catch {
        return null;
    }
}

function generateEmbed() {
    const url = document.getElementById("youtubeUrl").value.trim();
    const result = document.getElementById("result");
    result.innerHTML = "";

    const videoID = extractVideoID(url);

    if (!videoID) {
        result.innerHTML = "<div class='error'>Invalid YouTube link.</div>";
        return;
    }

    const embedUrl = `https://www.youtube-nocookie.com/embed/${videoID}`;

    result.innerHTML = `
        <div class="video-wrapper">
            <iframe 
                src="${embedUrl}"
                title="YouTube video player"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen>
            </iframe>
        </div>
    `;
}
</script>
<script>
  // Only if Service Workers are supported
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(registration => {
        console.log('Service Worker registered with scope:', registration.scope);
      })
      .catch(error => {
        console.log('Service Worker registration failed:', error);
      });
  }
</script>
</body>
</html>
